# mosquitto.conf — broker MQTT local com TLS (Chunk D).
# Escuta só em 8883 com TLS; exige usuário/senha (require_certificate false: o
# cliente valida o servidor pela CA, mas não usa certificado de cliente).

listener 8883
protocol mqtt

cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate false

allow_anonymous false
password_file /mosquitto/config/passwd

persistence false
log_dest stdout
log_type all
