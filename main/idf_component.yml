## Dependências gerenciadas (ESP-IDF Component Manager).
## Use `idf.py reconfigure` após alterar este arquivo.
dependencies:
  idf:
    version: ">=5.3"
  # Sensor de temperatura DS18B20 sobre 1-Wire (PLAN §2 — GPIO4).
  espressif/onewire_bus: "^1.0.2"
  espressif/ds18b20: "^0.1.2"
  # DHT22 (umidade, GPIO5): driver próprio em main/sensors.c usando o periférico RMT
  # (captura dos 40 bits em hardware) — sem componente gerenciado (decisão do PLAN §9).
